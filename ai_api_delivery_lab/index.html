<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>AI API Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 40px auto; line-height: 1.6; }
    label { display: block; margin-top: 14px; font-weight: 600; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 8px; }
    textarea { min-height: 100px; }
    button { padding: 8px 16px; margin-top: 12px; }
    pre { background: #f5f5f5; padding: 16px; overflow: auto; }
  </style>
</head>
<body>
  <h1>AI API Demo</h1>

  <label for="apiBase">API 地址</label>
  <input id="apiBase" value="http://127.0.0.1:8001" />

  <label for="token">本地测试 Token</label>
  <input id="token" type="password" placeholder="输入 COURSE_API_TOKEN 的值" />

  <label for="question">问题</label>
  <textarea id="question">RAG 是什么？</textarea>

  <button onclick="ask()">发送</button>
  <pre id="result"></pre>

  <script>
    async function ask() {
      const apiBase = document.getElementById("apiBase").value.replace(/\/$/, "");
      const token = document.getElementById("token").value;
      const question = document.getElementById("question").value;
      const result = document.getElementById("result");
      result.textContent = "请求中...";
      try {
        const res = await fetch(`${apiBase}/api/ask`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        result.textContent = String(err);
      }
    }
  </script>
</body>
</html>
